name: CI - Continuous Integration

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate-project:
    name: Validate project files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check if site folder exists
        run: |
          echo "Validando estrutura do projeto..."
          test -d site

      - name: Check if index.html exists
        run: |
          echo "Verificando arquivo principal..."
          test -f site/index.html

      - name: Validate HTML content
        run: |
          echo "Validando conteúdo da página..."
          grep -q "Guilherme Camargo" site/index.html
          grep -q "Meu primeiro deploy automatizado" site/index.html

      - name: Generate CI artifact
        uses: actions/upload-artifact@v4
        with:
          name: validated-site-guilherme
          path: site/